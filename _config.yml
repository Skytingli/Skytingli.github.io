Welcome to Jekyll!



This config file is meant for settings that affect your entire site, values

which you are expected to set up once and rarely need to edit after that.

For technical reasons, this file is NOT reloaded automatically when you use

jekyll serve -l -H localhost. If you change this file, please restart the

server process.

Basic Site Settings

locale                   : "zh-CN"site_theme               : "default" # The available themes options are "default", "air", "sunrise", "mint", "dirt" and "contrast"title                    : "李婷 Ting Li"title_separator          : "-"name                     : &name "李婷 Ting Li"description              : &description "李婷，江西财经大学数字经济学院产业经济学博士研究生个人学术主页"url                      : https://Skytingli.github.io # The base hostname & protocol for your site e.g. "https://[your GitHub username].github.io",# or if you already have some other page hosted on Github then use "https://[your GitHub username].github.io/[Your Repo Name]"baseurl                  : "" # the subpath of your site, e.g. "/blog"repository               : "Skytingli/Skytingli.github.io"

